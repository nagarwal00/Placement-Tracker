{% extends "base.html" %}

{% block content %}

<div class="card shadow p-5">

<h1 class="text-warning mb-4">
✏ Edit Company
</h1>

<form method="POST">

<div class="mb-3">

<label class="form-label">

Company Name

</label>

<input
type="text"
name="name"
class="form-control"
value="{{ company[1] }}"
required>

</div>

<div class="mb-3">

<label class="form-label">

Role

</label>

<input
type="text"
name="role"
class="form-control"
value="{{ company[2] }}"
required>

</div>

<div class="mb-3">

<label class="form-label">

Package (LPA)

</label>

<input
type="number"
step="0.1"
name="package"
class="form-control"
value="{{ company[3] }}"
required>

</div>

<div class="mb-3">

<label class="form-label">

Visit Date

</label>

<input
type="date"
name="visit_date"
class="form-control"
value="{{ company[4] }}"
required>

</div>

<div class="mb-3">

<label class="form-label">

Eligibility

</label>

<input
type="text"
name="eligibility"
class="form-control"
value="{{ company[5] }}"
required>

</div>

<button
class="btn btn-warning">

💾 Update Company

</button>

<a
href="/companies"
class="btn btn-secondary">

Cancel

</a>

</form>

</div>

{% endblock %}

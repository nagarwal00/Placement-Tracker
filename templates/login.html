{% extends "base.html" %}

{% block content %}

<div class="auth-bg">

    <div class="container">

        <div class="row align-items-center">

            <!-- LEFT SIDE -->

            <div class="col-lg-6 text-white d-none d-lg-block">

                <h1 class="display-3 fw-bold mb-3">
                    🎓 Placement Tracker
                </h1>

                <h4 class="mb-4">
                    Track • Prepare • Get Placed
                </h4>

                <p class="fs-5">
                    Welcome back! Continue your placement journey.
                </p>

                <br>

                <div class="mb-3">
                    <h5>🚀 Track Companies</h5>
                </div>

                <div class="mb-3">
                    <h5>📊 Monitor Progress</h5>
                </div>

                <div class="mb-3">
                    <h5>🎯 Crack Your Dream Placement</h5>
                </div>

            </div>

            <!-- RIGHT SIDE -->

            <div class="col-lg-6">

                <div class="auth-card">

                    <h2 class="text-center fw-bold text-primary mb-2">
                        Welcome Back
                    </h2>

                    <p class="text-center text-muted mb-4">
                        Login to continue
                    </p>

                    <form method="POST">

                        <div class="mb-3">

                            <label class="form-label fw-semibold">
                                Email Address
                            </label>

                            <input
                                type="email"
                                name="email"
                                class="form-control"
                                placeholder="Enter your email"
                                required>

                        </div>

                        <div class="mb-4">

                            <label class="form-label fw-semibold">
                                Password
                            </label>

                            <input
                                type="password"
                                name="password"
                                class="form-control"
                                placeholder="Enter your password"
                                required>

                        </div>

                        <button
                            type="submit"
                            class="btn btn-primary w-100">

                            Login

                        </button>

                    </form>

                    <hr class="my-4">

                    <p class="text-center mb-0">

                        Don't have an account?

                        <a href="/register" class="fw-bold">

                            Register

                        </a>

                    </p>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}

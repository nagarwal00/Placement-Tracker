{% extends "base.html" %}

{% block content %}

<div class="card shadow-lg p-5">

<h2 class="text-success mb-4">
➕ Add New Company
</h2>

<form method="POST">

<div class="mb-3">

<label class="form-label">
Company Name
</label>

<input
type="text"
name="name"
class="form-control"
required>

</div>

<div class="mb-3">

<label class="form-label">
Role
</label>

<input
type="text"
name="role"
class="form-control"
required>

</div>

<div class="mb-3">

<label class="form-label">
Package (LPA)
</label>

<input
type="number"
step="0.1"
name="package"
class="form-control"
required>

</div>

<div class="mb-3">

<label class="form-label">
Visit Date
</label>

<input
type="date"
name="visit_date"
class="form-control"
required>

</div>

<div class="mb-4">

<label class="form-label">
Eligibility
</label>

<input
type="text"
name="eligibility"
class="form-control"
required>

</div>

<button
type="submit"
class="btn btn-success btn-lg">

Save Company

</button>

<a
href="/companies"
class="btn btn-secondary btn-lg">

Back

</a>

</form>

</div>

{% endblock %}
